<!-- 5. PANTALLA FAVORITOS -->
<section id="view-songs-favs" style="display: none;">
    <header class="detail-header">
        <div class="header-content">
            <button class="back-circle-btn" onclick="showMainView()">
                <l-icon name="arrow-back"></l-icon>
            </button>
            <div class="header-info">
                <h1>Favoritos</h1>
            </div>
        </div>
        <div class="header-bg-blob"></div>
    </header>

    <main class="content list-container">
        <div class="list-stats" id="favs-stats-info">Playlist • Favoritos</div>
        <div class="search-container">
            <l-icon name="search"></l-icon>
            <input 
                placeholder="Buscar en favoritos..."
                type="search" 
                class="search-song" id="favs-song-search">
        </div>
        <ul id="favs-song-list" class="song-list"></ul>
    </main>
</section>
