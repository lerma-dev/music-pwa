<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Músic</title>
    <!-- ESTILOS -->
    <link rel="stylesheet" href="styles/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- WEB -->
    <link rel="icon" type="image/x-icon" href="assets/icons/favicon.ico">
    <!-- ANDROID -->
    <link rel="manifest" href="manifest.json">
    <!-- IOS -->
    <link rel="apple-touch-icon" href="assets/icons/icon-180.png">
    <meta name="apple-mobile-web-app-title" content="Music">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#4f3db4">
    <meta name="apple-mobile-web-app-status-bar-style" content="#4f3db4">
</head>
<body>
    <!-- SPINNER && TOAST-->
    <div id="loading-overlay" class="loading-overlay" style="display: none;">
        <div class="spinner"></div>
        <p>Agregando canciones...</p>
    </div>

    <div class="content-toast" id="content-toast"></div>

    <!-- VISTAS (se inyectan desde /pages) -->
    <div id="app"></div>
    <audio id="audio-engine"></audio>

    <!-- javascripts -->
    <script src="scripts/icons.js"></script>
    <script type="module" src="scripts/app.js"></script>
    <!-- Service Worker -->
    <script>
        if('serviceWorker' in navigator){
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(registration => {
                        console.log('Service Worker registrado con éxito:', registration.scope);
                    })
                    .catch(error => {
                        console.log('Registro de Service Worker fallido:', error);
                    });
            });
        }
    </script>
</body>
</html>
