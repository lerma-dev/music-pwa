<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sin Conexión - Mi Música</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            padding: 20px;
            max-width: 300px;
        }
        h1 {
            font-size: 24px;
            margin: 10px 0;
            font-weight: bold;
        }
        p {
            color: #b3b3b3;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 30px;
        }
        .btn-retry {
            background: linear-gradient(145deg, #7a251a, #5c1a12);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }
        .btn-retry:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Music</h1>
        <p>No tienes conexión a internet y esta sección no está guardada en tu dispositivo.</p>
        <button class="btn-retry" onclick="window.location.reload()">Reintentar</button>
    </div>

    <script>
        // Si detecta que internet vuelve, recarga solo
        window.addEventListener('online', () => {
            window.location.reload();
        });
    </script>
</body>
</html>
